name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease -Pappversion=${{ steps.version.outputs.version }}
      - name: Stage APK
        run: |
          mkdir -p dist
          cp androidApp/build/outputs/apk/release/androidApp-release.apk \
            "dist/DayView-${{ steps.version.outputs.version }}.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: dist/*.apk
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot binutils librsvg2-bin desktop-file-utils
      - name: Install appimagetool
        run: |
          curl -fsSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build Linux packages (.deb/.rpm + app-image)
        run: ./gradlew :shared:packageReleaseDistributionForCurrentOS -Pappversion=${{ steps.version.outputs.version }}
      - name: Render AppImage icon
        run: rsvg-convert -w 512 -h 512 artwork/dayview-icon-reference.svg -o /tmp/DayView.png
      - name: Build AppImage
        run: |
          mkdir -p dist
          scripts/build_appimage.sh \
            shared/build/compose/binaries/main-release/app/DayView \
            "${{ steps.version.outputs.version }}" \
            /tmp/DayView.png \
            dist
      - name: Stage deb/rpm
        run: |
          find shared/build/compose/binaries/main-release \
            -type f \( -name '*.deb' -o -name '*.rpm' \) -exec cp {} dist/ \;
          ls -la dist
      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: dist/*
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build release DMG
        run: ./gradlew :shared:packageReleaseDmg -Pappversion=${{ steps.version.outputs.version }}
      - name: Stage DMG
        run: |
          mkdir -p dist
          cp shared/build/compose/binaries/main-release/dmg/DayView-*.dmg dist/
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: [android, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
