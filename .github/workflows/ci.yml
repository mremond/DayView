name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, tests & Android APK (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Common & Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Desktop tests
        run: ./gradlew :composeApp:desktopTest

      - name: Assemble Android APKs (debug + minified release)
        run: ./gradlew :composeApp:assembleDebug :composeApp:assembleRelease

  desktop-macos:
    name: Desktop tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Desktop tests (compiles the Swift focus helper)
        run: ./gradlew :composeApp:desktopTest

  server:
    name: Sync server tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: false

      - name: Server tests
        run: go test ./...
        working-directory: server
