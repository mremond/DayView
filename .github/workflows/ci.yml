name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, tests & Android APK (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Core, common & Android unit tests
        run: ./gradlew :core:jvmTest :shared:testAndroidHostTest :androidApp:testDebugUnitTest

      - name: Desktop tests
        run: ./gradlew :shared:desktopTest

      - name: Upload responsive visual captures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dayview-visual-tests-linux
          path: shared/build/reports/visual-tests/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Assemble Android APKs (debug + minified release)
        run: ./gradlew :androidApp:assembleDebug :androidApp:assembleRelease

  desktop-macos:
    name: Desktop tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Desktop tests (compiles the Swift focus helper)
        run: ./gradlew :shared:desktopTest

      - name: Upload responsive visual captures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dayview-visual-tests-macos
          path: shared/build/reports/visual-tests/*.png
          if-no-files-found: error
          retention-days: 14

  server:
    name: Sync server tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: false

      - name: Server tests
        run: go test ./...
        working-directory: server
